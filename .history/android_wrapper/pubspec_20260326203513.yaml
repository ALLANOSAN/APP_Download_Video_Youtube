name: youtube_downloader_wrapper
description: Flutter wrapper for Python/FastAPI YouTubeDownloader backend
publish_to: "none"
version: 0.1.0+1
environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  webview_flutter: ^4.13.1
  firebase_core: ^4.6.0
  firebase_messaging: ^16.1.3
  http: ^1.6.0
  flutter_lints: ^2.0.3
  flutter_local_notifications: ^21.0.0
  path_provider: ^2.0.15
  youtube_explode_dart: ^1.10.5
  permission_handler: ^10.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true
